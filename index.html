<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Platform | Powered by Deriv</title>
    <style>
        /* THE COLOR OVERHAUL */
        :root {
            --bg-color: #1e293b;      /* Deep Slate Blue */
            --card-bg: #334155;      /* Lighter Slate */
            --accent-gold: #fbbf24;   /* Gold for importance */
            --text-main: #f8fafc;    /* Off-white */
            --price-up: #4ade80;     /* Neon Green */
            --price-down: #f87171;   /* Soft Red */
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        .platform-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            width: 320px;
        }

        .brand-text {
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        #price {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 15px 0;
            font-variant-numeric: tabular-nums; /* Prevents numbers from jumping */
        }

        .market-label {
            font-size: 1.1rem;
            opacity: 0.8;
        }

        .status-pill {
            display: inline-block;
            margin-top: 25px;
            padding: 5px 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 50px;
            font-size: 0.7rem;
            color: var(--accent-gold);
        }
    </style>
</head>
<body>

    <div class="platform-box">
        <div class="brand-text">Live Market Data</div>
        <div class="market-label">Volatility 100 (1s)</div>
        <div id="price">0.00</div>
        <div id="status" class="status-pill">Connecting...</div>
    </div>

    <script src="https://unpkg.com/@deriv/deriv-api/dist/DerivAPIBasic.js"></script>

    <script>
        // Replace 1089 with your App ID if you have a custom one
        const APP_ID =  2D8lj8BSXA1fj1c; 
        const connection = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`);
        const api = new DerivAPIBasic({ connection });

        let previousPrice = 0;

        connection.onopen = () => {
            document.getElementById('status').innerText = "SYSTEM LIVE";
            // '1HZ100V' is the code for Volatility 100 (1s) Index
            api.subscribe({ ticks: '1HZ100V' }).subscribe(updateUI);
        };

        function updateUI(data) {
            if (data.error) {
                console.error(data.error.message);
                return;
            }

            const currentPrice = data.tick.quote;
            const priceDisplay = document.getElementById('price');

            // Logic for Color Change
            if (currentPrice > previousPrice) {
                priceDisplay.style.color = "var(--price-up)";
            } else if (currentPrice < previousPrice) {
                priceDisplay.style.color = "var(--price-down)";
            }

            priceDisplay.innerText = currentPrice;
            previousPrice = currentPrice;
        }
    </script>
</body>
</html>
